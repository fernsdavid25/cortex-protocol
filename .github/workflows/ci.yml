name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege by default.
permissions:
  contents: read

jobs:
  # Static analysis + secret/vuln scans run ONCE (ubuntu) rather than per matrix
  # cell — they are platform-independent, so fanning them out would only burn CI
  # minutes. The pip-audit step also relies on bash process substitution, which
  # isn't available on the Windows/macOS test cells.
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # let gitleaks annotate a human PR with any findings
    steps:
      # Actions are pinned to full commit SHAs (not moving tags) so a tag-repoint
      # supply-chain attack (cf. tj-actions CVE-2025-30066) can't inject code.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so the secret scan covers all commits

      - name: Secret scan (gitleaks)
        # Skip on Dependabot PRs: they run with a read-only token (gitleaks' PR API
        # calls fail as "Resource not accessible by integration") and only bump pinned
        # versions. Still gates every push to main and every human PR.
        if: github.actor != 'dependabot[bot]'
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      # ruff, mypy, and pytest are declared in the `dev` optional-dependency group
      # (pyproject.toml), so every check runs against the locked toolchain via `--extra dev`.
      - name: Lint (ruff)
        run: uv run --extra dev ruff check .

      - name: Format check (ruff)
        run: uv run --extra dev ruff format --check .

      - name: Type-check (mypy)
        run: uv run --extra dev mypy server/cortex bench/cortex_bench --config-file pyproject.toml

      - name: Lockfile up to date
        run: uv lock --check

      - name: Dependency vulnerability audit
        # Blocking: a known CVE in the locked toolchain fails the build.
        run: uvx pip-audit --progress-spinner off -r <(uv export --no-emit-project --format requirements-txt)

  # Offline, deterministic suite (FakeProvider — no live LLM calls) across every
  # supported interpreter and OS. pythonpath (server, bench) + testpaths are set in
  # pyproject; fastmcp is a runtime dependency so the MCP-server tests run rather than skip.
  test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false # let every cell report so one platform's failure doesn't mask others
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Tests (pytest + coverage)
        # Baseline coverage is ~89%, so the 85% floor is a safe regression gate.
        run: uv run --extra dev pytest --cov=cortex --cov-report=term-missing --cov-report=xml --cov-fail-under=85

      - name: Upload coverage to Codecov
        # One representative cell only. fail_ci_if_error stays false so a transient Codecov
        # hiccup can never break CI. token is read from the CODECOV_TOKEN repo secret; if the
        # secret is unset the action falls back to tokenless upload (public repo).
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: fernsdavid25/cortex-protocol
