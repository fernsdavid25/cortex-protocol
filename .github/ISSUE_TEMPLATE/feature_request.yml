name: Feature request
description: Suggest an idea or improvement for Cortex Protocol.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Cortex adds a mechanism only when a benchmark shows it earns its cost
        (see [ROADMAP.md](https://github.com/fernsdavid25/cortex-protocol/blob/main/ROADMAP.md)),
        so please frame the problem first — the more concrete the use case, the easier it is to evaluate.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and where does Cortex fall short today?
      placeholder: "When I ... I can't ... because ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen? Sketch the API/behaviour if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried or thought about.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else — benchmark impact, cost implications, links, prior art.
    validations:
      required: false
